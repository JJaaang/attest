name: "Rekor v2 DSSE Keyless Upload"
description: "Sign a statement file with cosign keyless, upload as a DSSE entry to Rekor v2, and return the bundle path"

inputs:
  statement-file:
    description: "Path to the statement JSON file"
    required: true

  payload-type:
    description: "DSSE payloadType (e.g. application/vnd.vigilo.attestation+json)"
    required: true

outputs:
  envelope-path:
    description: "Path to the generated DSSE envelope JSON file"
    value: ${{ steps.run.outputs.envelope-path }}
  tlog-bundle-path:
    description: "Path to the generated Rekor tlog bundle JSON file"
    value: ${{ steps.run.outputs.tlog-bundle-path }}

    

runs:
  using: "composite"
  steps:
    - name: Install cosign
      uses: sigstore/cosign-installer@main
      with:
        cosign-release: "v3.0.3"

    - name: Install jq
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y jq

    - name: Run DSSE sign and Rekor v2 upload
      id: run
      shell: bash
      env:
        STATEMENT_FILE: ${{ inputs.statement-file }}
        PAYLOAD_TYPE: ${{ inputs.payload-type }}
        REKOR_SERVER: "https://log2025-1.rekor.sigstore.dev"
      run: |
        set -euo pipefail

        if [ ! -f "$STATEMENT_FILE" ]; then
          echo "statement file not found: $STATEMENT_FILE"
          exit 1
        fi

        SIGN_ALG="PKIX_ECDSA_P256_SHA_256"

        BASENAME="$(basename "$STATEMENT_FILE" .json)"
        WORKDIR="$(mktemp -d)"
        cp "$STATEMENT_FILE" "$WORKDIR/statement.json"

        TYPE_LEN="$(printf "%s" "$PAYLOAD_TYPE" | wc -c | tr -d ' ')"
        PAYLOAD_LEN="$(wc -c < "$WORKDIR/statement.json" | tr -d ' ')"

        (
          printf "DSSEv1 %s %s %s " \
            "$TYPE_LEN" \
            "$PAYLOAD_TYPE" \
            "$PAYLOAD_LEN"
          cat "$WORKDIR/statement.json"
        ) > "$WORKDIR/pae.bin"

        curl -sSL \
          https://raw.githubusercontent.com/sigstore/root-signing/refs/heads/main/targets/signing_config.v0.2.json \
          | jq 'del(.rekorTlogUrls)' > "$WORKDIR/signing-config-no-tlog.json"

        COSIGN_EXPERIMENTAL=1 cosign sign-blob \
          --yes \
          --bundle "$WORKDIR/${BASENAME}.sigstore.json" \
          --signing-config "$WORKDIR/signing-config-no-tlog.json" \
          "$WORKDIR/pae.bin"

        SIG_B64="$(jq -r '.messageSignature.signature' "$WORKDIR/${BASENAME}.sigstore.json")"
        CERT_RAW_B64="$(jq -r '.verificationMaterial.certificate.rawBytes' "$WORKDIR/${BASENAME}.sigstore.json")"
        PAYLOAD_B64="$(base64 -w0 "$WORKDIR/statement.json")"

        if [ -z "${SIG_B64}" ] || [ "${SIG_B64}" = "null" ]; then
          echo "failed to extract signature from bundle"
          exit 1
        fi

        if [ -z "${CERT_RAW_B64}" ] || [ "${CERT_RAW_B64}" = "null" ]; then
          echo "failed to extract certificate from bundle"
          exit 1
        fi

        jq -n \
          --arg pt "${PAYLOAD_TYPE}" \
          --arg p "${PAYLOAD_B64}" \
          --arg s "${SIG_B64}" \
          '{payload: $p, payloadType: $pt, signatures: [{sig: $s, keyid: ""}]}' \
          > "$WORKDIR/envelope.json"

        jq -n \
          --argjson env "$(cat "$WORKDIR/envelope.json")" \
          --arg cert "${CERT_RAW_B64}" \
          --arg alg "${SIGN_ALG}" \
          '{dsseRequestV002: {envelope: $env, verifiers: [{ x509Certificate: { rawBytes: $cert }, keyDetails: $alg }]}}' \
          > "$WORKDIR/rekor-v2-request.json"

        RESPONSE="$(
          curl -sS -X POST \
            "${REKOR_SERVER}/api/v2/log/entries" \
            -H "Content-Type: application/json" \
            -d @"$WORKDIR/rekor-v2-request.json"
        )"

        echo "Rekor response:"
        echo "$RESPONSE" | jq .

        if ! echo "$RESPONSE" | jq -e '.logIndex // .log_index // .entryID // .entryId' > /dev/null; then
          echo "Rekor v2 upload failed"
          exit 1
        fi

        LOG_INDEX="$(echo "$RESPONSE" | jq -r '.logIndex // .log_index')"

        if [ -z "$LOG_INDEX" ] || [ "$LOG_INDEX" = "null" ]; then
          echo "failed to extract logIndex"
          exit 1
        fi

        FINAL_ENVELOPE="${PWD}/envelope-${LOG_INDEX}.json"
        FINAL_TLOG_BUNDLE="${PWD}/tlog-${LOG_INDEX}.bundle"
        printf '%s\n' "$RESPONSE" | jq . > "$FINAL_TLOG_BUNDLE"

        echo "envelope-path=$FINAL_ENVELOPE" >> "$GITHUB_OUTPUT"
        echo "tlog-bundle-path=$FINAL_TLOG_BUNDLE" >> "$GITHUB_OUTPUT"
